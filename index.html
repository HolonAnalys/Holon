<style>
:root {
  --bg: #080d12;
  --teal: #5cbfb0;
  --teal-dim: #3a8a7f;
  --teal-glow: rgba(92,191,176,0.12);
  --gold: #c9a96e;
  --txt: #e8e4dc;
  --txt2: #8fa0b0;
  --muted: #4a5a6a;
  --border: rgba(92,191,176,0.15);
  --panel-bg: rgba(9,14,20,0.97);
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;overflow:hidden;background:var(--bg);}
body{font-family:'Inter',sans-serif;font-weight:300;color:var(--txt);}

/* LOADING */
#loading{
  position:fixed;inset:0;background:var(--bg);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;
  z-index:300;transition:opacity .6s;
}
.ld-icon{animation:pulse-icon 2s ease-in-out infinite;}
@keyframes pulse-icon{0%,100%{opacity:.7;}50%{opacity:1;}}
.ld-logo{font-family:'Cinzel',serif;font-size:32px;letter-spacing:.35em;animation:fu .7s .3s both;}
.ld-sub{font-family:'Cormorant Garamond',serif;font-size:13px;letter-spacing:.22em;color:var(--teal);font-style:italic;animation:fu .7s .55s both;}
.ld-bar{width:160px;height:1px;background:rgba(92,191,176,.12);overflow:hidden;animation:fu .4s .8s both;border-radius:1px;}
.ld-fill{height:100%;width:0;background:linear-gradient(90deg,var(--teal-dim),var(--teal));animation:bf 1.6s 1s cubic-bezier(.4,0,.2,1) forwards;}
@keyframes bf{to{width:100%;}}
@keyframes fu{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:none;}}

/* HEADER */
header{
  position:fixed;top:0;left:0;right:0;z-index:100;height:68px;
  background:linear-gradient(180deg,rgba(8,13,18,.98) 0%,rgba(8,13,18,.7) 100%);
  backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;padding:0 40px;
}
.lw{display:flex;align-items:center;gap:16px;}
.lt{font-family:'Cinzel',serif;font-size:22px;font-weight:600;letter-spacing:.28em;}
.ls{font-family:'Cormorant Garamond',serif;font-size:11px;letter-spacing:.2em;color:var(--teal);font-style:italic;display:block;margin-top:2px;}
nav{display:flex;align-items:center;gap:30px;}
.nl{font-family:'Cormorant Garamond',serif;font-size:14px;letter-spacing:.1em;color:var(--txt2);cursor:pointer;transition:color .2s;text-decoration:none;}
.nl:hover{color:var(--teal);}
.nc{border:1px solid var(--teal-dim);color:var(--teal);padding:7px 20px;font-family:'Cinzel',serif;font-size:10px;letter-spacing:.15em;transition:all .25s;cursor:pointer;text-decoration:none;}
.nc:hover{background:var(--teal-glow);border-color:var(--teal);}

/* GLOBE CANVAS */
#globe-wrap{
  position:fixed;inset:0;top:68px;
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;
}
#globe-canvas{
  display:block;
  cursor:grab;
}
#globe-canvas:active{cursor:grabbing;}

/* Ambient glow behind globe */
.globe-glow{
  position:absolute;
  width:600px;height:600px;
  background:radial-gradient(circle,rgba(92,191,176,.06) 0%,transparent 70%);
  pointer-events:none;border-radius:50%;
}

/* Tooltip */
#tip{
  position:fixed;
  background:rgba(8,13,18,.95);
  border:1px solid var(--border);
  padding:8px 16px;
  font-family:'Cormorant Garamond',serif;
  font-size:14px;letter-spacing:.04em;
  opacity:0;transition:opacity .15s;
  pointer-events:none;white-space:nowrap;
  z-index:200;
}

/* PANEL */
#panel{
  position:fixed;right:0;top:68px;bottom:0;
  width:0;overflow:hidden;
  transition:width .4s cubic-bezier(.4,0,.2,1);
  background:var(--panel-bg);
  border-left:1px solid var(--border);
  z-index:150;
  backdrop-filter:blur(20px);
}
#panel.open{width:400px;}
.pi{width:400px;height:100%;display:flex;flex-direction:column;}

.ph{padding:28px 28px 18px;border-bottom:1px solid var(--border);flex-shrink:0;}
.pr{font-family:'Cormorant Garamond',serif;font-size:10px;letter-spacing:.22em;color:var(--teal);text-transform:uppercase;margin-bottom:5px;}
.pn{font-family:'Cinzel',serif;font-size:20px;letter-spacing:.1em;font-weight:400;margin-bottom:10px;}
.pm{display:flex;gap:10px;align-items:center;flex-wrap:wrap;}
.tag{font-size:9px;letter-spacing:.14em;padding:3px 9px;border:1px solid rgba(92,191,176,.28);color:var(--teal-dim);font-family:'Cormorant Garamond',serif;}
.pc{font-family:'Cormorant Garamond',serif;font-size:12px;color:var(--muted);font-style:italic;}

.pf{padding:12px 28px;display:flex;gap:6px;flex-wrap:wrap;border-bottom:1px solid var(--border);flex-shrink:0;}
.fb{font-size:9px;letter-spacing:.12em;padding:4px 12px;background:transparent;border:1px solid var(--muted);color:var(--muted);cursor:pointer;font-family:'Cormorant Garamond',serif;transition:all .2s;}
.fb:hover,.fb.on{border-color:var(--teal-dim);color:var(--teal);}

.pl{flex:1;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--teal-dim) transparent;}
.pl::-webkit-scrollbar{width:3px;}
.pl::-webkit-scrollbar-thumb{background:var(--teal-dim);}

.ai{padding:20px 28px;border-bottom:1px solid rgba(92,191,176,.06);cursor:pointer;transition:background .18s;position:relative;}
.ai::before{content:'';position:absolute;left:0;top:0;bottom:0;width:2px;background:transparent;transition:background .2s;}
.ai:hover{background:rgba(92,191,176,.04);}
.ai:hover::before{background:var(--teal-dim);}
.at{font-size:9px;letter-spacing:.18em;text-transform:uppercase;margin-bottom:6px;font-family:'Inter',sans-serif;}
.at.thread{color:#5b9bd5;}.at.analyse{color:var(--teal);}.at.macro{color:var(--gold);}.at.note{color:#a07cc5;}
.ati{font-family:'Cormorant Garamond',serif;font-size:16px;color:var(--txt);line-height:1.45;margin-bottom:8px;font-weight:400;}
.ae{font-family:'Cormorant Garamond',serif;font-size:12px;font-style:italic;color:var(--txt2);line-height:1.6;margin-bottom:10px;}
.af{display:flex;justify-content:space-between;align-items:center;}
.ad{font-size:10px;color:var(--muted);letter-spacing:.06em;font-family:'Cormorant Garamond',serif;}
.al{font-size:10px;letter-spacing:.12em;color:var(--teal-dim);text-decoration:none;border-bottom:1px solid rgba(92,191,176,.3);padding-bottom:1px;transition:color .2s;font-family:'Cormorant Garamond',serif;}
.al:hover{color:var(--teal);}

.pe{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px;text-align:center;gap:16px;}
.pe p{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:14px;color:var(--muted);line-height:1.7;max-width:260px;}

.bclose{
  position:absolute;top:80px;right:14px;
  width:28px;height:28px;background:none;
  border:1px solid var(--border);color:var(--muted);
  cursor:pointer;font-size:12px;
  display:flex;align-items:center;justify-content:center;
  transition:all .2s;z-index:10;
}
.bclose:hover{color:var(--teal);border-color:var(--teal-dim);}

/* Bottom hint */
.hint{
  position:fixed;bottom:28px;left:50%;transform:translateX(-50%);
  font-family:'Cormorant Garamond',serif;font-style:italic;font-size:12px;
  color:var(--muted);letter-spacing:.08em;pointer-events:none;
  transition:opacity .3s;
}

/* Stars background */
#stars{position:fixed;inset:0;pointer-events:none;z-index:0;}
</style>

let W, H, R, cx, cy;
function resize(){
  W = wrap.clientWidth; H = wrap.clientHeight;
  canvas.width = W; canvas.height = H;
  cx = W/2; cy = H/2;
  R = Math.min(W, H) * 0.42;

// Projection
let rotation = [0, -20]; // [lambda, phi]
let targetRot = [0, -20];
let autoRotate = true;
let autoSpeed = 0.12;

function proj(lon, lat) {
  // Orthographic projection
  const lam = (lon + rotation[0]) * Math.PI / 180;
  const phi = lat * Math.PI / 180;
  const phi1 = rotation[1] * Math.PI / 180;

  const cosC = Math.sin(phi1)*Math.sin(phi) + Math.cos(phi1)*Math.cos(phi)*Math.cos(lam);
  if(cosC < 0) return null; // behind globe

  const x = R * Math.cos(phi) * Math.sin(lam);
  const y = R * (Math.cos(phi1)*Math.sin(phi) - Math.sin(phi1)*Math.cos(phi)*Math.cos(lam));
  return [cx + x, cy - y];
}
