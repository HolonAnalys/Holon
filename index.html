<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HOLON — Géoéconomie</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Cinzel:wght@400;600&family=Inter:wght@300;400&display=swap" rel="stylesheet">
<style>
:root{--bg:#080d12;--teal:#5cbfb0;--teal-dim:#3a8a7f;--teal-glow:rgba(92,191,176,0.12);--gold:#c9a96e;--txt:#e8e4dc;--txt2:#8fa0b0;--muted:#4a5a6a;--border:rgba(92,191,176,0.15);}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;overflow:hidden;background:var(--bg);}
body{font-family:'Inter',sans-serif;font-weight:300;color:var(--txt);}
header{position:fixed;top:0;left:0;right:0;z-index:100;height:62px;background:linear-gradient(180deg,rgba(8,13,18,.98),rgba(8,13,18,.7));backdrop-filter:blur(20px);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 20px;}
.lw{display:flex;align-items:center;gap:12px;}
.lt{font-family:'Cinzel',serif;font-size:18px;font-weight:600;letter-spacing:.28em;}
.ls{font-family:'Cormorant Garamond',serif;font-size:10px;letter-spacing:.2em;color:var(--teal);font-style:italic;display:block;margin-top:1px;}
nav{display:flex;align-items:center;gap:18px;}
.nl{font-family:'Cormorant Garamond',serif;font-size:13px;letter-spacing:.1em;color:var(--txt2);cursor:pointer;transition:color .2s;text-decoration:none;}
.nl:hover{color:var(--teal);}
.nc{border:1px solid var(--teal-dim);color:var(--teal);padding:5px 14px;font-family:'Cinzel',serif;font-size:9px;letter-spacing:.15em;transition:all .25s;cursor:pointer;background:none;}
.nc:hover{background:var(--teal-glow);}
#map-wrap{position:fixed;inset:0;top:62px;overflow:hidden;background:var(--bg);}
#map-svg{width:100%;height:100%;cursor:grab;display:block;}
#map-svg:active{cursor:grabbing;}
.country{fill:#162434;stroke:#1a2e42;stroke-width:.3;cursor:pointer;transition:fill .15s,stroke .15s;}
.country:hover{fill:#1f3a52;stroke:rgba(92,191,176,.4);}
.country.has-data{fill:#183040;stroke:rgba(92,191,176,.25);}
.country.has-data:hover{fill:#1e4a62;stroke:rgba(92,191,176,.6);}
.country.active{fill:#14352f!important;stroke:#5cbfb0!important;stroke-width:.8;}
.graticule{fill:none;stroke:rgba(255,255,255,.03);stroke-width:.4;}
.sphere{fill:#050d14;}
.border{fill:none;stroke:rgba(92,191,176,.08);stroke-width:.3;}
.dot-g{cursor:pointer;}
#zoom-ctrl{position:fixed;bottom:24px;right:16px;display:flex;flex-direction:column;gap:6px;z-index:50;}
.zb{width:32px;height:32px;background:rgba(8,13,18,.9);border:1px solid var(--border);color:var(--txt2);cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;transition:all .2s;line-height:1;}
.zb:hover{border-color:var(--teal-dim);color:var(--teal);}
.hint{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);font-family:'Cormorant Garamond',serif;font-style:italic;font-size:12px;color:var(--muted);letter-spacing:.08em;pointer-events:none;transition:opacity .4s;white-space:nowrap;}
#tip{position:fixed;background:rgba(6,11,17,.96);border:1px solid var(--border);padding:6px 13px;font-family:'Cormorant Garamond',serif;font-size:14px;letter-spacing:.04em;opacity:0;transition:opacity .12s;pointer-events:none;white-space:nowrap;z-index:200;}
#panel{position:fixed;right:0;top:62px;bottom:0;width:0;overflow:hidden;transition:width .38s cubic-bezier(.4,0,.2,1);background:rgba(7,12,18,.97);border-left:1px solid var(--border);z-index:150;backdrop-filter:blur(24px);}
#panel.open{width:min(380px,100vw);}
#panel.article-open{width:min(720px,100vw);}
.pi{width:min(720px,100vw);height:100%;display:flex;flex-direction:column;}
.ph{padding:22px 22px 14px;border-bottom:1px solid var(--border);flex-shrink:0;}
.pr{font-family:'Cormorant Garamond',serif;font-size:10px;letter-spacing:.22em;color:var(--teal);text-transform:uppercase;margin-bottom:3px;}
.pn{font-family:'Cinzel',serif;font-size:17px;letter-spacing:.1em;font-weight:400;margin-bottom:8px;}
.pm{display:flex;gap:7px;align-items:center;flex-wrap:wrap;}
.tag{font-size:9px;letter-spacing:.14em;padding:3px 9px;border:1px solid rgba(92,191,176,.28);color:var(--teal-dim);font-family:'Cormorant Garamond',serif;}
.pc{font-family:'Cormorant Garamond',serif;font-size:12px;color:var(--muted);font-style:italic;}
.pf{padding:9px 22px;display:flex;gap:5px;flex-wrap:wrap;border-bottom:1px solid var(--border);flex-shrink:0;}
.fb{font-size:9px;letter-spacing:.12em;padding:4px 10px;background:transparent;border:1px solid var(--muted);color:var(--muted);cursor:pointer;font-family:'Cormorant Garamond',serif;transition:all .2s;}
.fb:hover,.fb.on{border-color:var(--teal-dim);color:var(--teal);}
.pl{flex:1;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--teal-dim) transparent;}
.pl::-webkit-scrollbar{width:3px;}
.pl::-webkit-scrollbar-thumb{background:var(--teal-dim);}
.ai{padding:16px 22px;border-bottom:1px solid rgba(92,191,176,.06);transition:background .18s;position:relative;}
.ai::before{content:'';position:absolute;left:0;top:0;bottom:0;width:2px;background:transparent;transition:background .2s;}
.ai:hover{background:rgba(92,191,176,.04);}
.ai:hover::before{background:var(--teal-dim);}
.at{font-size:9px;letter-spacing:.18em;text-transform:uppercase;margin-bottom:4px;font-family:'Inter',sans-serif;}
.at.thread{color:#5b9bd5;}.at.analyse{color:var(--teal);}.at.macro{color:var(--gold);}.at.note{color:#a07cc5;}
.ati{font-family:'Cormorant Garamond',serif;font-size:15px;color:var(--txt);line-height:1.45;margin-bottom:6px;font-weight:400;}
.ae{font-family:'Cormorant Garamond',serif;font-size:12px;font-style:italic;color:var(--txt2);line-height:1.6;margin-bottom:9px;}
.af{display:flex;justify-content:space-between;align-items:center;}
.ad{font-size:10px;color:var(--muted);letter-spacing:.06em;font-family:'Cormorant Garamond',serif;}
.al{font-size:10px;letter-spacing:.12em;color:var(--teal-dim);text-decoration:none;border-bottom:1px solid rgba(92,191,176,.3);padding-bottom:1px;transition:color .2s;font-family:'Cormorant Garamond',serif;}
.al:hover{color:var(--teal);}
.pe{flex:1;display:flex;align-items:center;justify-content:center;padding:40px;text-align:center;}
.pe p{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:14px;color:var(--muted);line-height:1.7;max-width:220px;}
.bclose{position:absolute;top:70px;right:12px;width:26px;height:26px;background:none;border:1px solid var(--border);color:var(--muted);cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center;transition:all .2s;z-index:10;}
.bclose:hover{color:var(--teal);border-color:var(--teal-dim);}
/* Article view */
#article-view{display:none;flex:1;overflow-y:auto;flex-direction:column;scrollbar-width:thin;scrollbar-color:var(--teal-dim) transparent;}
#article-view::-webkit-scrollbar{width:3px;}
#article-view::-webkit-scrollbar-thumb{background:var(--teal-dim);}
#panel.article-open #article-view{display:flex;}
#panel.article-open .pf{display:none;}
#panel.article-open #pl{display:none;}
.art-back{padding:12px 22px;border-bottom:1px solid var(--border);flex-shrink:0;display:flex;align-items:center;gap:8px;cursor:pointer;transition:background .15s;}
.art-back:hover{background:rgba(92,191,176,.04);}
.art-back span{font-family:'Cormorant Garamond',serif;font-size:11px;letter-spacing:.12em;color:var(--muted);}
.art-back span:hover{color:var(--teal);}
.art-body{padding:28px 32px;flex:1;}
.art-type{font-size:9px;letter-spacing:.18em;text-transform:uppercase;margin-bottom:10px;font-family:'Inter',sans-serif;}
.art-type.thread{color:#5b9bd5;}.art-type.analyse{color:var(--teal);}.art-type.macro{color:var(--gold);}.art-type.note{color:#a07cc5;}
.art-title{font-family:'Cinzel',serif;font-size:19px;letter-spacing:.06em;font-weight:400;color:var(--txt);line-height:1.4;margin-bottom:16px;}
.art-meta{font-family:'Cormorant Garamond',serif;font-size:11px;color:var(--muted);margin-bottom:24px;letter-spacing:.06em;}
.art-lead{font-family:'Cormorant Garamond',serif;font-size:15px;font-style:italic;color:var(--txt2);line-height:1.75;margin-bottom:24px;padding-bottom:24px;border-bottom:1px solid var(--border);}
.art-content{font-family:'Cormorant Garamond',serif;font-size:14px;color:var(--txt);line-height:1.85;}
.art-content h3{font-family:'Cinzel',serif;font-size:11px;letter-spacing:.18em;color:var(--teal);margin:28px 0 10px;text-transform:uppercase;}
.art-content p{margin-bottom:16px;}
.art-content strong{color:var(--txt);font-weight:600;}
.art-content .conviction{background:rgba(92,191,176,.06);border-left:2px solid var(--teal-dim);padding:12px 16px;margin:20px 0;font-style:italic;color:var(--txt2);}
.art-content .warning{background:rgba(200,140,60,.06);border-left:2px solid rgba(200,140,60,.5);padding:12px 16px;margin:20px 0;font-style:italic;color:rgba(200,160,80,.8);}
.rzone{cursor:pointer;transition:opacity .2s;}
.rzone:hover{opacity:1!important;}
.country.pivot-country{fill:#1c2e3a;stroke:rgba(200,160,80,.2);}
.country.pivot-country.has-data{fill:#1e3040;}
#loading{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;z-index:300;transition:opacity .7s;}
.ld-logo{font-family:'Cinzel',serif;font-size:32px;letter-spacing:.35em;}
.ld-sub{font-family:'Cormorant Garamond',serif;font-size:13px;letter-spacing:.22em;color:var(--teal);font-style:italic;}
.ld-bar{width:160px;height:1px;background:rgba(92,191,176,.12);overflow:hidden;}
.ld-fill{height:100%;width:0;background:linear-gradient(90deg,var(--teal-dim),var(--teal));animation:bf 2s .2s ease-out forwards;}
@keyframes bf{to{width:100%;}}
/* MODALE ARTICLE */
#art-modal{display:none;position:fixed;inset:0;z-index:400;background:rgba(4,8,13,.88);backdrop-filter:blur(10px);overflow-y:auto;}
#art-modal.open{display:flex;align-items:flex-start;justify-content:center;padding:40px 20px;}
#art-box{background:#0a1520;border:1px solid rgba(92,191,176,.2);width:min(760px,96vw);position:relative;padding:48px 52px 52px;}
.art-close{position:absolute;top:16px;right:16px;background:none;border:1px solid var(--border);color:var(--muted);width:28px;height:28px;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;transition:all .2s;}
.art-close:hover{color:var(--teal);border-color:var(--teal-dim);}
.art-type{font-size:9px;letter-spacing:.22em;text-transform:uppercase;font-family:'Inter',sans-serif;margin-bottom:14px;}
.art-type.thread{color:#5b9bd5;}.art-type.analyse{color:var(--teal);}.art-type.macro{color:var(--gold);}.art-type.note{color:#a07cc5;}
.art-title{font-family:'Cinzel',serif;font-size:22px;letter-spacing:.06em;font-weight:400;line-height:1.4;color:var(--txt);margin-bottom:16px;}
.art-meta{font-family:'Cormorant Garamond',serif;font-size:11px;color:var(--muted);letter-spacing:.1em;margin-bottom:32px;padding-bottom:20px;border-bottom:1px solid var(--border);}
.art-body{font-family:'Cormorant Garamond',serif;font-size:16px;color:var(--txt2);line-height:1.9;}
.art-body p{margin-bottom:1.4em;}
.art-body h3{font-family:'Cinzel',serif;font-size:11px;letter-spacing:.2em;color:var(--teal);margin:2em 0 .8em;font-weight:400;}
.art-body strong{color:var(--txt);font-weight:600;}
.art-body .conviction{background:rgba(92,191,176,.05);border-left:2px solid var(--teal-dim);padding:14px 18px;margin:1.6em 0;font-style:italic;color:var(--txt);}
/* ADMIN */
#admin-overlay{display:none;position:fixed;inset:0;background:rgba(4,8,13,.92);z-index:500;backdrop-filter:blur(8px);}
#admin-overlay.open{display:flex;align-items:center;justify-content:center;}
#admin-box{background:#0c1520;border:1px solid rgba(92,191,176,.25);width:min(720px,96vw);max-height:88vh;display:flex;flex-direction:column;overflow:hidden;}
.adm-hd{padding:18px 22px;border-bottom:1px solid rgba(92,191,176,.15);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.adm-hd h2{font-family:'Cinzel',serif;font-size:13px;letter-spacing:.25em;color:var(--teal);}
.adm-hd span{font-family:'Cormorant Garamond',serif;font-size:11px;color:var(--muted);font-style:italic;}
.adm-close{background:none;border:1px solid var(--border);color:var(--muted);width:26px;height:26px;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;}
.adm-close:hover{color:var(--teal);border-color:var(--teal-dim);}
.adm-body{display:flex;flex:1;overflow:hidden;}
.adm-left{width:200px;flex-shrink:0;border-right:1px solid rgba(92,191,176,.1);overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--teal-dim) transparent;}
.adm-country-item{padding:9px 16px;cursor:pointer;font-family:'Cormorant Garamond',serif;font-size:13px;color:var(--txt2);border-bottom:1px solid rgba(92,191,176,.05);transition:all .15s;}
.adm-country-item:hover{background:rgba(92,191,176,.05);color:var(--txt);}
.adm-country-item.sel{background:rgba(92,191,176,.08);color:var(--teal);border-left:2px solid var(--teal);}
.adm-right{flex:1;overflow-y:auto;padding:18px 20px;scrollbar-width:thin;scrollbar-color:var(--teal-dim) transparent;}
.adm-section-title{font-family:'Cinzel',serif;font-size:10px;letter-spacing:.2em;color:var(--teal);margin-bottom:12px;}
.adm-article{background:rgba(255,255,255,.03);border:1px solid rgba(92,191,176,.1);padding:12px 14px;margin-bottom:10px;position:relative;}
.adm-article-title{font-family:'Cormorant Garamond',serif;font-size:14px;color:var(--txt);margin-bottom:4px;}
.adm-article-meta{font-size:10px;color:var(--muted);font-family:'Cormorant Garamond',serif;}
.adm-article-actions{position:absolute;top:10px;right:10px;display:flex;gap:6px;}
.adm-btn-sm{background:none;border:1px solid var(--border);color:var(--muted);font-size:10px;padding:2px 8px;cursor:pointer;font-family:'Cormorant Garamond',serif;transition:all .15s;}
.adm-btn-sm:hover{color:var(--teal);border-color:var(--teal-dim);}
.adm-btn-sm.del:hover{color:#e05555;border-color:#e05555;}
.adm-add-btn{width:100%;padding:9px;background:none;border:1px dashed rgba(92,191,176,.25);color:var(--teal-dim);font-family:'Cormorant Garamond',serif;font-size:12px;cursor:pointer;letter-spacing:.1em;transition:all .2s;margin-top:4px;}
.adm-add-btn:hover{border-color:var(--teal);color:var(--teal);}
.adm-form{background:rgba(92,191,176,.04);border:1px solid rgba(92,191,176,.15);padding:16px;margin-top:12px;}
.adm-form label{display:block;font-size:9px;letter-spacing:.15em;color:var(--muted);margin-bottom:4px;font-family:'Inter',sans-serif;}
.adm-form input,.adm-form textarea,.adm-form select{width:100%;background:rgba(255,255,255,.04);border:1px solid rgba(92,191,176,.15);color:var(--txt);font-family:'Cormorant Garamond',serif;font-size:13px;padding:7px 10px;margin-bottom:12px;outline:none;}
.adm-form input:focus,.adm-form textarea:focus,.adm-form select:focus{border-color:var(--teal-dim);}
.adm-form textarea{height:70px;resize:vertical;}
.adm-form select option{background:#0c1520;}
.adm-form-actions{display:flex;gap:8px;justify-content:flex-end;}
.adm-btn{padding:7px 18px;background:none;border:1px solid var(--teal-dim);color:var(--teal);font-family:'Cinzel',serif;font-size:9px;letter-spacing:.15em;cursor:pointer;transition:all .2s;}
.adm-btn:hover{background:var(--teal-glow);}
.adm-btn.cancel{border-color:var(--muted);color:var(--muted);}
.adm-btn.cancel:hover{border-color:var(--txt2);color:var(--txt2);}
.adm-export{padding:14px 20px;border-top:1px solid rgba(92,191,176,.1);flex-shrink:0;display:flex;align-items:center;gap:10px;}
.adm-export-note{font-family:'Cormorant Garamond',serif;font-size:11px;color:var(--muted);font-style:italic;flex:1;}
</style>
</head>

<script>
window.onload = function() {

const DATA = {

  "United States of America":{region:"Amérique du Nord",tags:["Géopolitique","Dollar","Protectionnisme"],lat:38,lon:-97,articles:[
    {type:"macro",title:"Monde fragmenté 2026 : l'hypothèse cadre",excerpt:"Multipolarité croissante, domination US contestée, dédollarisation lente, coût du capital structurellement plus élevé. Les fondements du portefeuille global changent.",date:"1 mars 2026",url:"article",body:`<h3>HYPOTHÈSE CADRE</h3><p>Le monde de 2026 n'est pas celui de 2015. L'hypothèse de travail centrale de HOLON est la suivante : nous sommes entrés dans une phase de <strong>fragmentation structurelle</strong> de l'économie mondiale, après trois décennies de mondialisation heureuse. Ce n'est pas une crise conjoncturelle — c'est un changement de régime.</p><h3>LES CINQ PILIERS DE L'HYPOTHÈSE</h3><p><strong>1. Multipolarité croissante.</strong> Les États-Unis restent la première puissance militaire et financière mondiale, mais leur capacité à imposer des règles du jeu unilatérales s'érode. La Chine, l'Inde, les puissances moyennes du Golfe et d'Asie du Sud-Est refusent de choisir un camp. Le monde est multipolaire de fait, sinon de droit.</p><p><strong>2. Dédollarisation lente.</strong> La part du dollar dans les réserves mondiales est passée de 72% en 2001 à environ 58% en 2024 (FMI, COFER). Le mouvement est réel mais graduel. Pas d'effondrement du dollar à court terme — mais une diversification structurelle des réserves vers l'euro, le yuan et l'or.</p><p><strong>3. Coût du capital structurellement plus élevé.</strong> L'ère des taux zéro est terminée. L'inflation s'est normalisée à des niveaux modérés mais persistants (2,5-4% dans les économies avancées), cohérents avec une fragmentation qui renchérit les coûts de production et de transport. La Fed ne reviendra pas aux taux de 2015-2019 sauf récession sévère.</p><p><strong>4. IA redistributive.</strong> L'intelligence artificielle crée de la valeur de manière très concentrée — vers les détenteurs de données propriétaires, d'infrastructure de calcul et d'intégration métier profonde. Elle ne crée pas d'effondrement systémique, mais accélère la rotation sectorielle et creuse les écarts entre les entreprises avec des <em>moats</em> défendables et les autres.</p><p><strong>5. Protectionnisme structurel.</strong> Trump a accéléré une tendance commencée sous Obama et Biden : le retour de la politique industrielle, des tarifs stratégiques et de la sécurisation des chaînes d'approvisionnement. Ce mouvement est bipartisan aux États-Unis et se diffuse en Europe. Les coûts structurels des échanges mondiaux augmentent.</p><h3>IMPLICATIONS POUR LES PORTEFEUILLES</h3><div class="conviction">Penser les portefeuilles en blocs géopolitiques (US, UE, Asie, BRICS+). Privilégier la diversification FX et la sous-pondération USD structurelle. Favoriser les secteurs de souveraineté économique : défense, énergie locale, infrastructure, ressources critiques. Sélection active indispensable — la dispersion sectorielle est élevée et va le rester.</div>`},
    {type:"analyse",title:"La fin du néolibéralisme américain : rupture ou pause ?",excerpt:"Retrait des accords multilatéraux, tarifs agressifs, sécurisation industrielle — Trump ou pas, la politique américaine a changé de logiciel. Les mécanismes de marché restent, le consensus de Washington non.",date:"15 fév. 2026",url:"#"},
    {type:"macro",title:"Dédollarisation : érosion lente, pas effondrement",excerpt:"La part du dollar dans les réserves mondiales recule graduellement. Pas de rupture systémique, mais une multipolarité monétaire qui s'installe. Implication : diversifier FX, sous-pondérer USD structurellement.",date:"28 fév. 2026",url:"article",body:`<h3>ÉTAT DES LIEUX</h3><p>La dédollarisation est réelle mais souvent mal comprise. Ce n'est pas un effondrement du dollar — c'est une érosion lente et structurelle de son hégémonie dans les transactions et les réserves mondiales. La nuance est capitale pour un investisseur.</p><p>Les données du FMI (rapport COFER) montrent que la part du dollar dans les réserves mondiales de change est passée de 72% en 2001 à 58% en 2024. Cette baisse de 14 points en 23 ans représente un transfert de plusieurs milliers de milliards de dollars vers d'autres actifs — principalement l'euro (20%), le yen japonais et, plus récemment, l'or.</p><h3>LES MOTEURS STRUCTURELS</h3><p><strong>Les sanctions comme accélérateur.</strong> Le gel des 300 Mds USD de réserves russes en 2022 a envoyé un signal puissant aux banques centrales du monde entier : détenir des réserves en dollars, c'est accepter que les États-Unis puissent les confisquer. La Chine, l'Inde, les pays du Golfe ont tous accéléré leur diversification après cet épisode.</p><p><strong>La montée des règlements bilatéraux.</strong> L'Inde achète du pétrole russe en roupies. La Chine règle ses importations de gaz qatari en yuan. Le Brésil et la Chine commercent en monnaies locales. Ces arrangements restent marginaux en volume global, mais leur multiplication crée une infrastructure alternative au système dollar.</p><p><strong>L'or comme actif de réserve alternatif.</strong> Les banques centrales des pays émergents — Chine, Inde, Turquie, Pologne — ont acheté de l'or à un rythme record en 2022-2024 (plus de 1000 tonnes par an selon le World Gold Council). L'or ne verse pas de coupon, mais ne peut pas être gelé par sanction.</p><h3>LES LIMITES DE LA DÉDOLLARISATION</h3><p>Aucune monnaie ne peut remplacer le dollar à court ou moyen terme. L'euro manque de profondeur de marché obligataire unifiée. Le yuan reste non convertible et sous contrôle des capitaux. Une monnaie BRICS+ est une chimère politique — les intérêts de la Chine, de l'Inde et du Brésil sont trop divergents pour créer une union monétaire crédible.</p><div class="conviction">Notre conviction : le dollar restera la monnaie de réserve dominante pour 10-15 ans minimum, mais sa part va continuer à s'éroder de 1-2 points par an. Implication portefeuille : diversification FX structurelle, surpondération or physique (5-10% en allocation tactique), intérêt pour les obligations émergentes en monnaie locale.</div>`},

  "China":{region:"Asie-Pacifique",tags:["Géopolitique","Semi-conducteurs","Découplage"],lat:35,lon:103,articles:[
    {type:"analyse",title:"Autosuffisance technologique : la grande ambition de Xi",excerpt:"Pékin investit massivement pour s'affranchir des dépendances occidentales en semi-conducteurs, IA et énergie. Un pari de long terme aux implications géopolitiques majeures.",date:"22 fév. 2026",url:"#"},
    {type:"macro",title:"Déflation chinoise : le piège japonais est-il inévitable ?",excerpt:"Les parallèles avec le Japon des années 90 sont troublants : bulle immobilière dégonflée, consommation atone, excès de capacités industrielles. Le scénario de la décennie perdue est sur la table.",date:"5 fév. 2026",url:"article",body:`<h3>LE PARALLÈLE JAPONAIS</h3><p>L'économie chinoise présente en 2025-2026 des ressemblances troublantes avec le Japon des années 1990, au lendemain de l'éclatement de la bulle immobilière. Bulle immobilière qui se dégonfle (Evergrande, Country Garden), consommation intérieure atone malgré les stimulus, excès massifs de capacités industrielles, démographie qui se retourne — les ingrédients d'une <strong>décennie perdue</strong> sont réunis.</p><p>L'inflation est nulle voire négative en Chine depuis 2023. L'indice des prix à la production (PPI) est en territoire négatif. Les entreprises n'investissent pas, les ménages n'empruntent plus. C'est la définition d'une trappe à liquidité.</p><h3>LES DIFFÉRENCES AVEC LE JAPON</h3><p>Mais l'analogie a des limites. La Chine dispose d'outils que le Japon n'avait pas : une capacité de contrôle étatique sur l'allocation du crédit, un secteur export encore très compétitif grâce aux surcapacités industrielles (qui tirent les prix mondiaux vers le bas), et un niveau de revenus par habitant encore bas qui laisse théoriquement de la place pour rattrapage.</p><p>Le problème est que les politiques de relance traditionnelles (immobilier, infrastructure) sont épuisées ou contre-productives. Pékin cherche une transition vers la consommation intérieure et l'innovation, mais cette transition prend du temps — et le contexte géopolitique (découplage, tarifs) la complique.</p><div class="conviction">Notre conviction : la Chine évite le scénario de l'effondrement brutal, mais entre dans une phase de croissance structurellement plus basse (3-4% au lieu de 6-8%). Implication : sous-pondérer les actifs chinois exposés à la consommation domestique et à l'immobilier. Conserver une exposition sélective sur les champions technologiques et les exportateurs industriels.</div>`},
    {type:"analyse",title:"Taiwan : pourquoi l'invasion reste improbable à court terme",excerpt:"L'interconnexion industrielle rend un conflit extraordinairement coûteux pour Pékin — en particulier sans garantie sur les semi-conducteurs. Les escalades asymétriques restent le scénario central.",date:"14 jan. 2026",url:"#"},

  "Russia":{region:"Eurasie",tags:["Guerre","Sanctions","Énergie"],lat:61,lon:90,articles:[
    {type:"analyse",title:"L'économie de guerre russe : jusqu'où peut-elle tenir ?",excerpt:"Malgré les sanctions, la Russie affiche une croissance dopée par les dépenses militaires. Mais les déséquilibres s'accumulent : inflation, pénurie de main-d'oeuvre, dépendance aux hydrocarbures.",date:"25 fév. 2026",url:"article",body:`<h3>LA RÉSILIENCE PARADOXALE</h3><p>L'économie russe a surpris tous les observateurs. Après la chute initiale de 2022 (-2,1% de PIB), elle a rebondi à +3,6% en 2023 et +3,2% en 2024. Les sanctions n'ont pas provoqué l'effondrement espéré par l'Occident. Pourquoi ?</p><p>La réponse tient en trois mots : <strong>économie de guerre</strong>. Les dépenses militaires représentent désormais environ 7% du PIB russe (contre 4% en 2021). Cette injection keynésienne massive soutient l'emploi et la demande intérieure. Les industries de défense tournent à plein régime. Le chômage est au plus bas historique — non parce que l'économie est florissante, mais parce que les hommes sont soit au front, soit dans les usines d'armement.</p><h3>LES DÉSÉQUILIBRES QUI S'ACCUMULENT</h3><p>Cette résilience de surface cache des fractures profondes. L'inflation dépasse 9% en 2024, forçant la Banque centrale à maintenir des taux directeurs à 16-21% — des niveaux qui étranglent les investissements civils. La pénurie de main-d'oeuvre est sévère dans les secteurs non militaires. Les importations de biens technologiques ont chuté massivement, dégradant la productivité sur le long terme.</p><p>Le rouble s'est déprécié de 25% en 2023-2024 malgré les contrôles de capitaux. Les revenus pétroliers, bien que redirigés vers l'Asie, sont soumis à des décotes importantes (le brut russe se vend avec 15-25 USD de rabais). Le budget fédéral est déficitaire pour la première fois depuis des années.</p><div class="conviction">Notre conviction : l'économie russe peut tenir encore 2-3 ans dans ce mode dégradé, mais les fondamentaux se détériorent irréversiblement. Elle n'est pas investissable pour les investisseurs occidentaux. En revanche, surveiller les implications sur les marchés de l'énergie et les effets de substitution dans les chaînes d'approvisionnement asiatiques.</div>`},

  "Ukraine":{region:"Europe de l'Est",tags:["Guerre","Reconstruction","Pivot"],lat:49,lon:31,articles:[
    {type:"analyse",title:"Ukraine, pivot de l'échiquier mondial — Brzezinski avait raison",excerpt:"Dans Le Grand Échiquier, Brzezinski identifiait l'Ukraine comme pivot géopolitique absolu. Le conflit en cours le confirme : qui contrôle l'Ukraine oriente l'architecture sécuritaire de l'Europe entière.",date:"20 fév. 2026",url:"article",body:`<h3>BRZEZINSKI ET LE GRAND ÉCHIQUIER</h3><p>En 1997, Zbigniew Brzezinski publiait <em>Le Grand Échiquier</em>. Sa thèse centrale : l'Eurasie est l'enjeu géopolitique décisif du XXIe siècle, et l'Ukraine en est le pivot absolu. Sans l'Ukraine, la Russie n'est qu'une puissance régionale asiatique. Avec l'Ukraine — son industrie, sa population de 40 millions d'habitants, son accès à la mer Noire et sa profondeur stratégique — la Russie redevient un empire eurasiatique capable de contester l'hégémonie américaine.</p><p>Trente ans plus tard, cette analyse s'impose avec une clarté brutale. L'invasion de février 2022 n'est pas une réaction à l'élargissement de l'OTAN — c'est une tentative de résoudre la « question ukrainienne » par la force avant que l'Ukraine ne bascule définitivement dans l'orbite occidentale.</p><h3>L'UKRAINE COMME PIVOT ACTIF</h3><p>Ce qui a changé depuis Brzezinski, c'est que l'Ukraine est passée de pivot <em>passif</em> (enjeu des grandes puissances) à pivot <em>actif</em>. La résistance militaire ukrainienne a démontré une capacité de combat et une cohésion nationale que personne n'anticipait. L'armée ukrainienne est aujourd'hui l'une des plus expérimentées d'Europe — un actif stratégique durable, quel que soit le résultat du conflit.</p><p>L'intégration européenne avance : l'Ukraine a obtenu le statut de candidat en juin 2022, les négociations d'adhésion ont commencé en 2024. Ce processus, même long, recompose la géographie économique et sécuritaire de l'Europe orientale.</p><div class="conviction">Notre conviction : l'Ukraine sera membre de l'UE d'ici 2030-2035. La reconstruction représente l'opportunité d'investissement la plus massive en Europe depuis les années 50. Les secteurs prioritaires : infrastructures énergétiques, logistique, agro-industrie, défense. Le risque principal reste la durée et les modalités de fin du conflit.</div>`},

  "Poland":{region:"Europe de l'Est",tags:["OTAN","Pivot","Défense"],lat:52,lon:20,articles:[
    {type:"analyse",title:"Pologne : la puissance montante de l'Europe centrale",excerpt:"La Pologne est devenue le pivot stratégique de l'OTAN à l'Est. Croissance solide, réarmement massif, positionnement géographique clé entre l'Allemagne et l'Ukraine.",date:"18 fév. 2026",url:"article",body:`<h3>LE REPOSITIONNEMENT GÉOPOLITIQUE</h3><p>La Pologne est l'une des grandes gagnantes de la recomposition géopolitique post-2022. Son positionnement géographique — frontière commune avec l'Ukraine, la Biélorussie et l'enclave russe de Kaliningrad — l'a transformée en pivot stratégique incontournable de l'Alliance atlantique. Varsovie a saisi cette opportunité avec une détermination remarquable.</p><p>Le budget de défense polonais atteint 4% du PIB en 2024-2025, le plus élevé de l'OTAN. La Pologne achète massivement — F-35 américains, chars K2 et obusiers K9 sud-coréens, systèmes Patriot, HIMARS. Elle est en train de se constituer l'une des armées les plus puissantes d'Europe centrale, avec une doctrine explicitement tournée contre la Russie.</p><h3>LA FRACTURE EUROPE CENTRALE</h3><p>La Pologne contraste radicalement avec ses voisins du groupe de Visegrád. La Hongrie d'Orban maintient des liens économiques et politiques avec Moscou et Pékin, bloque régulièrement les décisions européennes sur l'Ukraine et négocie des exemptions aux sanctions. La Slovaquie de Fico a pivoté vers une ligne pro-russe depuis 2023, suspendant l'aide militaire à Kiev.</p><p>Cette fracture n'est pas conjoncturelle — elle reflète des lectures radicalement différentes de l'histoire et de la menace russe. Pour la Pologne, qui garde mémoire des partages et de l'occupation soviétique, la menace russe est existentielle. Pour Orban, la Russie est un partenaire commercial et un modèle politique.</p><div class="conviction">Notre conviction : la Pologne est l'un des cas d'investissement les plus intéressants d'Europe — croissance solide, dette maîtrisée, réarmement qui soutient l'industrie de défense nationale, intégration croissante dans les chaînes de valeur de l'UE. Le risque principal : la polarisation politique interne et les tensions avec Bruxelles sur l'État de droit.</div>`},
    {type:"macro",title:"Triangle Pologne-Hongrie-Slovaquie : trois visions de l'Europe centrale",excerpt:"Trois pays du flanc est de l'UE, trois rapports radicalement différents à Bruxelles, à l'OTAN et à la Russie. Une fracture durable au coeur de l'Europe.",date:"10 fév. 2026",url:"#"},

  "Norway":{region:"Europe du Nord",tags:["Fonds souverain","Hors-euro","Modèle nordique"],lat:65,lon:14,articles:[
    {type:"analyse",title:"Le fonds souverain norvégien : 1 700 Mds USD et une leçon pour le monde",excerpt:"La Norvège a transformé sa rente pétrolière en patrimoine collectif transgénérationnel. Le GPFG est le plus grand fonds souverain au monde — un modèle que peu de pays ont su reproduire.",date:"22 fév. 2026",url:"article",body:`<h3>COMMENT LA NORVÈGE A ÉVITÉ LA MALÉDICTION DES RESSOURCES</h3><p>La « malédiction des ressources » est un phénomène bien documenté : les pays riches en matières premières tendent à sous-performer économiquement, à développer des institutions faibles et à négliger leur tissu productif non-extractif. Le Nigeria, le Venezuela, l'Angola en sont des illustrations tragiques.</p><p>La Norvège a fait l'exact opposé. Lorsque le pétrole de la mer du Nord a commencé à couler dans les années 70, Oslo a pris une décision structurante : <strong>ne pas dépenser les revenus pétroliers dans le budget courant</strong>. En 1990, le Gouvernement norvégien a créé le <em>Statens pensjonsfond utland</em> (Government Pension Fund Global), avec une règle simple : les revenus pétroliers vont dans le fonds, et seulement le rendement réel attendu (fixé à 3%) peut être utilisé pour financer le budget.</p><h3>L'ÉCHELLE ET LA STRATÉGIE</h3><p>En 2026, le fonds dépasse 1 700 milliards USD — soit environ 300 000 USD par Norvégien. Il détient des participations dans plus de 9 000 entreprises dans 70 pays, représentant environ 1,5% de toutes les actions cotées mondiales. Sa taille est telle que ses décisions d'investissement font bouger les marchés.</p><p>Le fonds a des règles strictes d'exclusion éthique : il exclut les entreprises de tabac, d'armement controversé, et celles dont les pratiques environnementales ou sociales violent ses standards. Il publie ses participations et ses votes en assemblée générale — un modèle de transparence.</p><h3>LA LEÇON POUR LES INVESTISSEURS</h3><p>L'approche norvégienne illustre ce que l'économiste Ricardo appelle la rente — la valeur créée par la possession d'une ressource rare. La question n'est pas si la ressource est présente, mais <strong>comment en allouer la rente de façon transgénérationnelle</strong>. Le fonds souverain est la réponse institutionnelle à cette question.</p><div class="conviction">Le GPFG est une référence mondiale en gestion d'actifs à long terme. Ses allocations sectorielles et géographiques sont un signal de marché à surveiller. Sa politique d'exclusion ESG influence les standards globaux. Pour un investisseur, suivre les mouvements du fonds norvégien est un outil d'analyse macro de premier ordre.</div>`},

  "Switzerland":{region:"Europe",tags:["Neutralité","Finance","Agilité"],lat:47,lon:8,articles:[
    {type:"analyse",title:"La Suisse : anatomie d'un pays sans ressources qui surperforme",excerpt:"Pas de pétrole, pas de grande taille, pas d'empire. Pourtant la Suisse affiche l'un des PIB par habitant les plus élevés au monde. La recette : institutions, démocratie directe, fédéralisme, spécialisation maximale.",date:"20 fév. 2026",url:"article",body:`<h3>LE PARADOXE HELVÉTIQUE</h3><p>La Suisse n'a pas de pétrole, pas de charbon, pas de minerais stratégiques, pas d'empire colonial passé. Elle est enclavée, sans accès à la mer. Sa superficie est inférieure à celle de la Belgique. Et pourtant, elle affiche un PIB par habitant de 90 000 USD — parmi les cinq plus élevés au monde — et des indicateurs sociaux (santé, éducation, qualité de vie) qui font référence.</p><p>Comment ? La réponse tient à un ensemble cohérent de choix institutionnels et économiques construits sur plusieurs siècles.</p><h3>LES QUATRE PILIERS DU MODÈLE SUISSE</h3><p><strong>1. Institutions stables et démocratie directe.</strong> La Suisse pratique la démocratie directe à tous les niveaux — référendums fédéraux, cantonaux, communaux. Ce système oblige à des compromis, ralentit les réformes brutales, mais produit une légitimité politique et une stabilité institutionnelle exceptionnelles. Les entreprises et les investisseurs savent ce qu'ils obtiennent.</p><p><strong>2. Fédéralisme fiscal fort.</strong> Les cantons suisses se font concurrence pour attirer les résidents et les entreprises. Cette compétition fiscale intérieure a produit des taux d'imposition modérés, une administration efficiente et une spécialisation par canton (Zoug pour la finance et la crypto, Bâle pour la pharma, Genève pour le négoce de matières premières).</p><p><strong>3. Spécialisation dans la valeur ajoutée maximale.</strong> La Suisse s'est spécialisée dans ce que peu de pays savent faire : chimie-pharma (Novartis, Roche), finance de haute gamme (gestion de fortune privée), horlogerie de luxe, machines-outils de précision. Des secteurs où les marges sont exceptionnelles et la concurrence des pays à bas coûts limitée.</p><p><strong>4. Neutralité comme actif stratégique.</strong> La neutralité suisse n'est pas un archaïsme — c'est une position qui génère de la valeur économique réelle. Genève est le siège de l'ONU européenne, du CICR, de l'OMC. La place financière attire des capitaux du monde entier précisément parce que la Suisse ne choisit pas de camp.</p><h3>LA NEUTRALITÉ SOUS PRESSION</h3><p>Le conflit ukrainien a mis ce modèle sous tension. La pression américaine et européenne pour que Berne rejoigne pleinement les sanctions contre la Russie, le débat sur la réexportation d'armes, le rapprochement sécuritaire avec l'UE — autant de forces qui testent les limites de la neutralité traditionnelle.</p><div class="conviction">La Suisse reste un modèle de référence pour tout investisseur cherchant une exposition à des actifs de qualité dans un cadre institutionnel stable. Le franc suisse est une valeur refuge structurelle. Les grandes multinationales suisses (Nestlé, Novartis, Roche, ABB) combinent qualité bilancielle et exposition mondiale diversifiée.</div>`},
    {type:"macro",title:"Neutralité helvétique sous pression : jusqu'où tenir ?",excerpt:"Sanctions Russie, rapprochement défense UE, pressions américaines — l'équilibre traditionnel suisse est testé comme jamais depuis la Seconde Guerre mondiale.",date:"8 fév. 2026",url:"#"},

  ]},

  "France":{region:"Europe",tags:["Politique","Désindustrialisation","Institutions"],lat:46,lon:2,articles:[
    {type:"analyse",title:"La crise française est institutionnelle, pas seulement budgétaire",excerpt:"Le déficit à 6% du PIB est un symptôme. Le noeud : une Ve République sclérosée, une élite de la mondialisation heureuse en fin de vie, une démocratie représentative en panne.",date:"2 mars 2026",url:"article",body:`<h3>LE MAUVAIS DIAGNOSTIC</h3><p>Le débat public français sur la crise économique se focalise sur le déficit budgétaire (6% du PIB en 2024, le plus élevé de la zone euro après la Grèce) et la dette publique (110% du PIB). Ces chiffres sont réels et préoccupants. Mais ils sont le <em>symptôme</em>, pas la maladie.</p><p>Le vrai problème est plus profond et plus difficile à traiter : <strong>la France souffre d'un blocage institutionnel structurel</strong> qui l'empêche de réformer, d'adapter son modèle économique aux nouvelles réalités, et de reconstituer une légitimité politique suffisante pour gouverner.</p><h3>LA Ve RÉPUBLIQUE SCLÉROSÉE</h3><p>La Ve République a été conçue pour un contexte précis : mettre fin à l'instabilité de la IVe République et donner à de Gaulle les moyens de gouverner. Le présidentialisme fort, le scrutin majoritaire à deux tours, la primauté de l'exécutif — tout cela fonctionnait dans un monde bipolaire (gauche/droite) avec un consensus sur les grandes orientations économiques.</p><p>Ce monde n'existe plus. La fragmentation politique est extrême (7-8 formations politiques significatives depuis 2017), le consensus économique a volé en éclats, et l'abstention atteint des records. La Ve République produit désormais soit des majorités absolues non représentatives de la diversité politique réelle, soit des situations de cohabitation ou de minorité qui paralysent l'action réformatrice.</p><h3>LES ÉLITES DE LA MONDIALISATION HEUREUSE</h3><p>La France est gouvernée depuis 40 ans par une élite formée dans un corpus intellectuel précis : promotion du libre-échange, intégration européenne, désindustrialisation assumée au profit des services, confiance dans les institutions multilatérales. Ce logiciel était cohérent avec le monde de 1985-2008. Il est en fin de vie.</p><p>Les crises des Gilets jaunes, le rejet du traité constitutionnel européen en 2005, la montée des extrêmes, le succès du RN — tous ces phénomènes ont en commun d'être des révoltes contre ce logiciel et ses porteurs. L'élite réagit en les qualifiant de populisme irrationnel, ce qui interdit toute remise en question sérieuse.</p><h3>DÉSINDUSTRIALISATION ET RAPPORT À L'EURO</h3><p>La France a perdu environ 2 millions d'emplois industriels entre 1980 et 2020. Sa part dans la valeur ajoutée industrielle européenne a chuté de 17% à 10%. Plusieurs facteurs : politique de la monnaie forte (franc fort puis euro) peu compatible avec la compétitivité industrielle, charges sociales élevées, culture managériale qui a déprécié l'industrie au profit de la finance et des services.</p><p>Le rapport à l'euro est le sujet tabou par excellence du débat politique français. Pourtant, l'écart de compétitivité avec l'Allemagne au sein d'une zone monétaire commune sans possibilité de dévaluation crée une pression structurelle permanente — qui se traduit soit par la dette publique (pour compenser par la dépense), soit par le chômage (ajustement par le marché du travail).</p><div class="conviction">La France reste une puissance économique majeure avec des actifs réels : grandes entreprises compétitives à l'international (LVMH, Airbus, Total, L'Oréal), infrastructure de qualité, capital humain élevé. Mais le risque institutionnel s'accroît. En portefeuille : exposition sélective aux champions exportateurs français, éviter les actifs dépendants de la demande intérieure et de la dépense publique.</div>`},
    {type:"macro",title:"Désindustrialisation française : 40 ans de décrochage",excerpt:"2 millions d'emplois industriels perdus, part dans la VA européenne divisée par deux. Le lien entre monnaie forte, fiscalité du travail et choix politiques des années 80-2000.",date:"15 fév. 2026",url:"#"},

    {type:"note",title:"France et euro : le débat refoulé",excerpt:"L'écart de compétitivité avec l'Allemagne, la dette et la pression des marchés imposent d'y réfléchir sérieusement. Le tabou politique ne supprime pas la contrainte économique.",date:"20 jan. 2026",url:"#"}

  "Singapore":{region:"Asie du Sud-Est",tags:["Hub","Finance","Agilité"],lat:1.3,lon:103.8,articles:[
    {type:"analyse",title:"Singapour : la cité-État qui a tout compris",excerpt:"5 millions d'habitants, zéro ressource naturelle, PIB par habitant parmi les plus élevés au monde. Dans un monde fragmenté, sa position de hub neutre entre les blocs devient encore plus précieuse.",date:"20 fév. 2026",url:"article",body:`<h3>LE MIRACLE SINGAPOURIEN</h3><p>En 1965, Singapour est expulsée de la fédération malaisienne. Lee Kuan Yew, son premier ministre, aurait pleuré en annonçant l'indépendance forcée d'un territoire sans ressources, sans eau potable, sans hinterland. Soixante ans plus tard, Singapour affiche un PIB par habitant de 80 000 USD, une espérance de vie parmi les plus élevées au monde, et un hub financier qui rivalise avec Londres et New York pour la gestion de fortune asiatique.</p><p>C'est l'une des transformations économiques les plus spectaculaires de l'histoire moderne — et elle offre des leçons directement applicables à d'autres contextes.</p><h3>LES PILIERS DU MODÈLE</h3><p><strong>État stratège, pas État providence.</strong> Singapour pratique un capitalisme d'État discipliné. Les entreprises d'État (Temasek, GIC) sont gérées selon des critères de performance stricts. L'État investit massivement dans l'éducation, les infrastructures et la R&D, mais laisse le marché allouer les ressources dans la plupart des secteurs.</p><p><strong>Mérite institutionnel.</strong> La fonction publique singaporienne est parmi les mieux payées au monde — pour attirer les meilleurs talents et réduire la corruption. Le résultat : des institutions qui fonctionnent, une réglementation prévisible, une justice efficace. C'est le fondement de la confiance des investisseurs étrangers.</p><p><strong>Neutralité stratégique active.</strong> Singapour entretient des relations militaires avec les États-Unis (accès aux bases navales) tout en étant le premier partenaire commercial de la Chine en Asie du Sud-Est. Elle héberge des multinationales américaines, européennes et chinoises simultanément. Cette neutralité n'est pas passive — elle est activement construite et défendue.</p><h3>SINGAPOUR DANS LE MONDE FRAGMENTÉ</h3><p>La fragmentation géopolitique renforce l'avantage singapourien. Quand les entreprises cherchent une base régionale qui n'oblige pas à choisir entre les États-Unis et la Chine, Singapour s'impose. La migration de capitaux et de family offices depuis Hong Kong post-2020 l'illustre parfaitement : le nombre de family offices à Singapour est passé de 400 en 2020 à plus de 1 100 en 2023.</p><div class="conviction">Singapour est une allocation structurelle dans tout portefeuille asiatique. Exposition via le dollar singapourien (valeur refuge régionale), les REITs singaporiens (rendement + qualité institutionnelle), et les banques locales (DBS, OCBC, UOB) qui bénéficient des flux de capitaux régionaux.</div>`},
    {type:"macro",title:"Singapour hub financier : résilient face à la pression de Hong Kong",excerpt:"La migration de capitaux depuis Hong Kong vers Singapour s'est accélérée après 2020. La cité-État absorbe ce flux tout en préservant ce qui la rend attractive.",date:"8 fév. 2026",url:"#"},

  ]},

  "Vietnam":{region:"Asie du Sud-Est",tags:["Industrie","Frontière","Non-aligné"],lat:16,lon:106,articles:[
    {type:"analyse",title:"Vietnam : le grand gagnant du découplage US-Chine",excerpt:"Le Vietnam est la principale destination de la relocalisation industrielle fuyant la Chine. Il combine coûts compétitifs, main-d'oeuvre éduquée et capacité d'intégration dans les chaînes de valeur mondiales.",date:"22 fév. 2026",url:"article",body:`<h3>LE REPOSITIONNEMENT INDUSTRIEL</h3><p>Le Vietnam est l'une des histoires économiques les plus remarquables de la décennie. Depuis 2018 et le début de la guerre commerciale US-Chine, le pays est devenu la destination de relocalisation industrielle par excellence. Nike, Samsung, Intel, Apple (via ses sous-traitants) — des dizaines de multinationales ont transféré une partie de leur production chinoise vers le Vietnam.</p><p>Les chiffres parlent d'eux-mêmes : les exportations vietnamiennes ont triplé en dix ans, passant de 150 Mds USD en 2014 à plus de 350 Mds USD en 2024. Le pays est devenu l'un des principaux exportateurs mondiaux d'électronique, de textiles et de chaussures. Son PIB par habitant a doublé en dix ans.</p><h3>LES ATOUTS STRUCTURELS</h3><p><strong>Main-d'oeuvre éduquée à coût compétitif.</strong> Le Vietnam investit massivement dans l'éducation depuis les années 90. Son score aux évaluations PISA est supérieur à de nombreux pays de l'OCDE, pour un coût salarial encore très inférieur à la Chine. Cette combinaison — qualité et coût — est rare et difficile à reproduire.</p><p><strong>Stabilité politique et prévisibilité.</strong> Le régime du Parti communiste vietnamien, paradoxalement, offre une prévisibilité politique appréciée des investisseurs étrangers. Les règles du jeu ne changent pas brutalement. La corruption existe mais est gérée. Le pays honore ses engagements dans les accords commerciaux (CPTPP, RCEP, accord UE-Vietnam).</p><p><strong>Position géographique stratégique.</strong> Le Vietnam partage une longue frontière terrestre et maritime avec la Chine — ce qui en fait à la fois un concurrent et un partenaire commercial naturel. Sa façade sur la mer de Chine méridionale lui donne accès aux routes maritimes les plus stratégiques du globe.</p><h3>LE NON-ALIGNEMENT PRAGMATIQUE</h3><p>Le Vietnam pratique un non-alignement remarquablement sophistiqué. Il achète des armes aux États-Unis et à la Russie simultanément. Il bénéficie des investissements chinois tout en résistant aux pressions territoriales de Pékin en mer de Chine méridionale. Il s'intègre dans les chaînes de valeur américaines tout en maintenant des relations commerciales étroites avec la Chine.</p><p>Cette posture n'est pas de la naïveté — c'est une stratégie héritée de siècles de résistance aux grandes puissances et adaptée au XXIe siècle.</p><div class="conviction">Le Vietnam est l'un des cas d'investissement les plus convaincants d'Asie du Sud-Est pour la décennie 2025-2035. Exposition via les fonds actions Vietnam (VFMVF1, VinaCapital) ou les ETF Asie du Sud-Est hors Chine. Risques principaux : dépendance excessive à quelques grands donneurs d'ordres, tensions en mer de Chine méridionale, succès du programme d'autosuffisance technologique chinois.</div>`},
    {type:"macro",title:"Vietnam et Chine : voisins indispensables, rivaux historiques",excerpt:"Hanoi bénéficie du découplage US-Chine tout en maintenant des relations économiques étroites avec Pékin. Un non-alignement pragmatique remarquablement cohérent.",date:"10 fév. 2026",url:"#"},

  "Taiwan":{region:"Asie-Pacifique",tags:["Semi-conducteurs","Géopolitique","Chine"],lat:23.5,lon:121,articles:[
    {type:"analyse",title:"Taiwan : l'île la plus dangereuse du monde et la plus indispensable",excerpt:"TSMC fabrique plus de 90% des puces les plus avancées du monde. C'est le bouclier de silicium de Taiwan — mais un bouclier qui s'érode à mesure que la Chine développe ses propres capacités.",date:"25 fév. 2026",url:"article",body:`<h3>LE BOUCLIER DE SILICIUM</h3><p>Taiwan Semiconductor Manufacturing Company (TSMC) fabrique entre 90 et 95% des puces les plus avancées du monde (noeud 3nm et en dessous en 2025). Smartphones haut de gamme, serveurs d'IA, systèmes d'armes de précision, satellites — pratiquement tout ce qui compte dans l'économie numérique mondiale dépend de TSMC.</p><p>Cette concentration crée une situation géopolitique sans précédent. Une invasion chinoise de Taiwan ne détruirait pas seulement la démocratie taiwanaise — elle déstabiliserait l'économie mondiale entière, y compris celle de la Chine. C'est ce que les stratèges appellent le <em>silicon shield</em> : l'indispensabilité industrielle comme dissuasion.</p><h3>LES LIMITES DU BOUCLIER</h3><p>Mais ce bouclier a des failles. La première : il ne protège pas des formes de coercition inférieures au seuil de la guerre — blocus naval, pression économique, campagnes de désinformation, sabotage. La Chine peut exercer une pression considérable sur Taiwan sans déclencher une invasion frontale.</p><p>La seconde, plus structurelle : le bouclier s'érode. Pékin investit des centaines de milliards pour développer ses propres capacités en semi-conducteurs. SMIC, Hua Hong, et des dizaines de start-ups chinoises progressent. Les estimations varient, mais un consensus émerge : la Chine pourrait atteindre une autonomie partielle sur les puces avancées entre 2030 et 2035. À mesure que cette dépendance diminue, la valeur dissuasive du bouclier diminue.</p><h3>LA CHAÎNE DE VALEUR DES SEMI-CONDUCTEURS</h3><p>La chaîne de valeur des semi-conducteurs est la plus complexe et la plus géographiquement concentrée de l'économie mondiale :</p><p>— <strong>Design</strong> : États-Unis (Nvidia, Qualcomm, Intel), ARM (Royaume-Uni/Japan)</p><p>— <strong>Lithographie EUV</strong> : ASML, monopole absolu aux Pays-Bas</p><p>— <strong>Fabrication avancée</strong> : TSMC (Taiwan), Samsung (Corée), Intel (en cours de montée en gamme)</p><p>— <strong>Matériaux</strong> : Japon (Shin-Etsu, SUMCO pour les wafers de silicium)</p><p>— <strong>Assemblage/test</strong> : Asie du Sud-Est</p><p>Chaque maillon est un point de fragilité géopolitique. Le CHIPS Act américain (52 Mds USD) et le European Chips Act (43 Mds EUR) visent à redistribuer cette carte — avec des résultats encore très partiels.</p><div class="conviction">Taiwan est le risque géopolitique le plus systémique de la décennie 2025-2035. Il ne justifie pas d'éviter les semi-conducteurs — mais il impose une prime de risque et une diversification des expositions. Privilégier les entreprises avec capacité de production hors Taiwan (Samsung, Intel en montée en gamme), les équipementiers (ASML reste incontournable), et surveiller l'avancement du programme chinois d'autosuffisance.</div>`},

const mapWrap = document.getElementById('map-wrap');
const svg = d3.select('#map-svg');
const tip = document.getElementById('tip');
let W = mapWrap.clientWidth, H = mapWrap.clientHeight;
svg.attr('width', W).attr('height', H);

const projection = d3.geoNaturalEarth1().scale(W/6.5).translate([W/2, H/2]);
const pathGen = d3.geoPath().projection(projection);
const graticule = d3.geoGraticule().step([20,20]);

const mapG = svg.append('g');
mapG.append('path').datum({type:'Sphere'}).attr('class','sphere').attr('d',pathGen);
mapG.append('path').datum(graticule()).attr('class','graticule').attr('d',pathGen);
const countryG = mapG.append('g');
const dotsG = mapG.append('g');

const zoom = d3.zoom().scaleExtent([1,10]).on('zoom', function(e){
  mapG.attr('transform', e.transform);
  const k = e.transform.k;
  dotsG.selectAll('circle.di').attr('r', 3.5/Math.sqrt(k));
  dotsG.selectAll('circle.do').attr('r', 7/Math.sqrt(k)).style('stroke-width', 1/k);
  countryG.selectAll('.country').style('stroke-width', 0.3/k);
});
svg.call(zoom);
document.getElementById('zin').onclick = () => svg.transition().duration(300).call(zoom.scaleBy, 1.5);
document.getElementById('zout').onclick = () => svg.transition().duration(300).call(zoom.scaleBy, 0.67);

// Un seul fetch, vers unpkg directement
fetch('https://unpkg.com/world-atlas@2/countries-110m.json')
  .then(r => { if(!r.ok) throw new Error(r.status); return r.json(); })
  .then(world => {
    const countries = topojson.feature(world, world.objects.countries);
    const borders = topojson.mesh(world, world.objects.countries, (a,b) => a!==b);

    countryG.selectAll('path').data(countries.features).join('path')
      .attr('class', d => 'country'+(N2N[+d.id]&&DATA[N2N[+d.id]]?' has-data':''))
      .attr('d', pathGen)
      .on('mousemove', function(e,d){ const n=N2N[+d.id]; if(n) showTip(e.clientX,e.clientY,n); })
      .on('mouseleave', hideTip)
      .on('click', function(e,d){ const n=N2N[+d.id]; if(n){selectCountry(n,d3.select(this));e.stopPropagation();} });

    mapG.append('path').datum(borders).attr('class','border').attr('d',pathGen);

    Object.entries(DATA).forEach(([name,d]) => {
      const pos = projection([d.lon,d.lat]); if(!pos) return;
      const g = dotsG.append('g').attr('class','dot-g').attr('transform',`translate(${pos[0]},${pos[1]})`);
      g.append('circle').attr('class','do').attr('r',7).attr('fill','none').attr('stroke','rgba(92,191,176,.5)').attr('stroke-width',1);
      g.append('circle').attr('class','di').attr('r',3.5).attr('fill','#5cbfb0');
      g.on('mousemove', function(e){ showTip(e.clientX,e.clientY,name); e.stopPropagation(); })
       .on('mouseleave', hideTip)
       .on('click', function(e){ selectCountry(name,null); e.stopPropagation(); });
    });

    // Pays pivots — légère teinte dorée sur les pays "Puissance moyenne"
    const PIVOTS = ["Turkey","India","Saudi Arabia"];
    countryG.selectAll('path').each(function(d){
      const name = N2N[+d.id];
      if(PIVOTS.includes(name)) d3.select(this).classed('pivot-country', true);
    });

    // Zones ressources
    const zonesG = mapG.insert('g', ':first-child').attr('id','zones-g');

    // Defs pour hachures
    const defs = svg.select('defs').empty() ? svg.append('defs') : svg.select('defs');
    const hatch = defs.append('pattern').attr('id','hatch-res').attr('patternUnits','userSpaceOnUse').attr('width',6).attr('height',6).attr('patternTransform','rotate(45)');
    hatch.append('line').attr('x1',0).attr('y1',0).attr('x2',0).attr('y2',6).attr('stroke','rgba(200,140,60,0.18)').attr('stroke-width',1.5);

    const hatch2 = defs.append('pattern').attr('id','hatch-rare').attr('patternUnits','userSpaceOnUse').attr('width',6).attr('height',6).attr('patternTransform','rotate(45)');
    hatch2.append('line').attr('x1',0).attr('y1',0).attr('x2',0).attr('y2',6).attr('stroke','rgba(160,100,220,0.2)').attr('stroke-width',1.5);

    RESOURCE_ZONES.forEach(zone => {
      const hatchId = zone.id === 'terres-rares' ? 'hatch-rare' : 'hatch-res';
      zone.features.forEach(feat => {
        zonesG.append('path')
          .datum(feat)
          .attr('class','rzone')
          .attr('d', pathGen)
          .attr('fill', `url(#${hatchId})`)
          .attr('stroke', zone.stroke)
          .attr('stroke-width', 0.6)
          .attr('opacity', 0.85)
          .on('mousemove', function(e){ showTipZone(e.clientX, e.clientY, zone.label); e.stopPropagation(); })
          .on('mouseleave', hideTip)
          .on('click', function(e){ selectZone(zone); e.stopPropagation(); });
      });
    });

    hideLoading();
  })
  .catch(() => hideLoading());

svg.on('click', closePanel);

function hideLoading(){
  const ld = document.getElementById('loading');
  ld.style.opacity='0';
  setTimeout(()=>ld.style.display='none', 700);
}

function showTipZone(mx,my,label){
  tip.style.opacity='1'; tip.style.left=(mx+14)+'px'; tip.style.top=(my-10)+'px';
  tip.innerHTML=`<strong style="color:#c87840">${label}</strong>`;
}
function selectZone(zone){
  countryG.selectAll('.country').classed('active',false);
  curD = {region:"Ressources critiques", tags:[zone.type], articles: zone.articles};
  document.getElementById('pn').textContent = zone.label;
  document.getElementById('pr').textContent = "Ressources critiques";
  document.getElementById('pcount').textContent = `${zone.articles.length} analyses`;
  document.getElementById('ptags').innerHTML = `<span class="tag" style="border-color:rgba(200,140,60,.4);color:#c87840">${zone.id==='terres-rares'?'Terres rares':'Hydrocarbures'}</span>`;
  renderList();
  document.getElementById('panel').classList.add('open');
  document.getElementById('hint').style.opacity='0';
}
function showTip(mx,my,name){
  const d=DATA[name];
  tip.style.opacity='1'; tip.style.left=(mx+14)+'px'; tip.style.top=(my-10)+'px';
  tip.innerHTML=`<strong style="color:${d?'#5cbfb0':'#8fa0b0'}">${name}</strong>${d?` <span style="color:#4a5a6a;font-size:11px"> — ${d.articles.length} analyse${d.articles.length>1?'s':''}</span>`:''}`;
}
function hideTip(){ tip.style.opacity='0'; }

let curF='all', curD=null;
function selectCountry(name, pathEl){
  countryG.selectAll('.country').classed('active',false);
  if(pathEl) pathEl.classed('active',true);
  else countryG.selectAll('.country').filter(d=>N2N[+d.id]===name).classed('active',true);
  curD = DATA[name]||null;
  document.getElementById('pn').textContent = name;
  document.getElementById('pr').textContent = curD?curD.region:'—';
  document.getElementById('pcount').textContent = curD?`${curD.articles.length} analyse${curD.articles.length>1?'s':''}`:'';
  document.getElementById('ptags').innerHTML = curD?curD.tags.map(t=>`<span class="tag">${t}</span>`).join(''):'';
  renderList();
  document.getElementById('panel').classList.add('open');
  document.getElementById('hint').style.opacity='0';
}
function closePanel(){
  document.getElementById('panel').classList.remove('open');
  countryG.selectAll('.country').classed('active',false);
  document.getElementById('hint').style.opacity='1';
}
function renderList(){
  const el=document.getElementById('pl');
  if(!curD){el.innerHTML='<div class="pe"><p>Aucune analyse disponible pour cette zone.</p></div>';return;}
  const items=curF==='all'?curD.articles:curD.articles.filter(a=>a.type===curF);
  if(!items.length){el.innerHTML='<div class="pe"><p>Aucune analyse de ce type.</p></div>';return;}
  window._curArticles = items;
  el.innerHTML=items.map((a,i)=>`<div class="ai">
    <div class="at ${a.type}">${a.type.toUpperCase()}</div>
    <div class="ati">${a.title}</div>
    <div class="ae">${a.excerpt}</div>
    <div class="af">
      <span class="ad">${a.date}</span>
      ${a.body ? `<a href="#" class="al" onclick="openArticle(event,${i})">Lire →</a>` : ''}
    </div>
  </div>`).join('');
}

function openArticle(e, i){
  e.preventDefault();
  const a = window._curArticles[i];
  if(!a || !a.body) return;
  const av = document.getElementById('article-view');
  av.querySelector('.art-body').innerHTML =
    `<div class="art-type ${a.type}">${a.type.toUpperCase()}</div>
     <div class="art-title">${a.title}</div>
     <div class="art-meta">${a.date}</div>
     <div class="art-lead">${a.excerpt}</div>
     <div class="art-content">${a.body}</div>`;
  av.scrollTop = 0;
  document.getElementById('panel').classList.add('article-open');
}

document.getElementById('art-back').addEventListener('click', function(){
  document.getElementById('panel').classList.remove('article-open');
});
document.querySelectorAll('.fb').forEach(b=>{
  b.addEventListener('click',()=>{
    document.querySelectorAll('.fb').forEach(x=>x.classList.remove('on'));
    b.classList.add('on'); curF=b.dataset.f; renderList();
  });
});
document.getElementById('pcl').addEventListener('click', closePanel);

window.addEventListener('resize',()=>{
  W=mapWrap.clientWidth; H=mapWrap.clientHeight;
  svg.attr('width',W).attr('height',H);
  projection.scale(W/6.5).translate([W/2,H/2]);
  mapG.selectAll('path').attr('d',pathGen);

    const pos=projection([d.lon,d.lat]); if(!pos) return;
    dotsG.selectAll('.dot-g').filter(function(){ return d3.select(this).attr('data-name')===name; }).attr('transform',`translate(${pos[0]},${pos[1]})`);

function openArticle(e, idx){
  e.preventDefault();
  var a = (window._curArticles||[])[idx];
  if(!a) return;
  document.getElementById('art-type').className = 'art-type ' + a.type;
  document.getElementById('art-type').textContent = a.type.toUpperCase();
  document.getElementById('art-title').textContent = a.title;
  document.getElementById('art-meta').textContent = a.date;
  document.getElementById('art-body').innerHTML = a.body || '<p style="font-style:italic;color:var(--txt2)">' + a.excerpt + '</p>';
  document.getElementById('art-modal').classList.add('open');
}
function closeArticleModal(){
  document.getElementById('art-modal').classList.remove('open');
}

function admRenderCountryList(){
  var el = document.getElementById('adm-country-list');
  el.innerHTML = Object.keys(DATA).sort().map(function(name){
    return '<div class="adm-country-item' + (name===admSelCountry?' sel':'') + '" data-name="' + name + '">' + name + '</div>';
  }).join('');
  el.querySelectorAll('.adm-country-item').forEach(function(item){
    item.addEventListener('click', function(){
      admSelCountry = item.dataset.name;
      admEditIdx = null;
      admRenderCountryList();
      admRenderRight();
    });
  });
}

function admRenderRight(){
  var el = document.getElementById('adm-right');
  if(!el) return;
  if(!admSelCountry){
    el.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100%;font-family:\'Cormorant Garamond\',serif;font-style:italic;color:var(--muted);font-size:14px;">Sélectionnez un pays</div>';
    return;
  }
  var d = DATA[admSelCountry];
  var articles = d ? d.articles : [];
  var html = '<div class="adm-section-title">' + admSelCountry.toUpperCase() + ' — ' + articles.length + ' article' + (articles.length>1?'s':'') + '</div>';

  articles.forEach(function(a, i){
    html += '<div class="adm-article">'
      + '<div class="adm-article-title">' + a.title + '</div>'
      + '<div class="adm-article-meta">' + a.type.toUpperCase() + ' · ' + a.date + '</div>'
      + (admUnlocked ? '<div class="adm-article-actions">'
          + '<button class="adm-btn-sm" onclick="admEditArticle(' + i + ')">Modifier</button>'
          + '<button class="adm-btn-sm del" onclick="admDeleteArticle(' + i + ')">Supprimer</button>'
          + '</div>' : '')
      + '</div>';
  });

  if(admUnlocked){
    html += '<button class="adm-add-btn" onclick="admNewArticle()">+ Nouvel article</button>';
  }

  if(admEditIdx !== null){
    var a = admEditIdx === 'new' ? {type:'analyse',title:'',excerpt:'',date:'',url:'#'} : articles[admEditIdx];
    if(a){
      html += '<div class="adm-form" id="adm-form">'
        + '<label>TYPE</label>'
        + '<select id="af-type">'
        + '<option value="analyse"' + (a.type==='analyse'?' selected':'') + '>Analyse</option>'
        + '<option value="macro"' + (a.type==='macro'?' selected':'') + '>Macro</option>'
        + '<option value="thread"' + (a.type==='thread'?' selected':'') + '>Thread</option>'
        + '<option value="note"' + (a.type==='note'?' selected':'') + '>Note</option>'
        + '</select>'
        + '<label>TITRE</label>'
        + '<input id="af-title" type="text" value="' + (a.title||'').replace(/"/g,'&quot;') + '">'
        + '<label>EXTRAIT</label>'
        + '<textarea id="af-excerpt">' + (a.excerpt||'') + '</textarea>'
        + '<label>DATE</label>'
        + '<input id="af-date" type="text" value="' + (a.date||'') + '">'
        + '<label>URL</label>'
        + '<input id="af-url" type="text" value="' + (a.url||'#') + '">'
        + '<div class="adm-form-actions">'
        + '<button class="adm-btn cancel" onclick="admCancelEdit()">Annuler</button>'
        + '<button class="adm-btn" onclick="admSaveArticle()">Enregistrer</button>'
        + '</div></div>';
    }
  }

  el.innerHTML = html;
  if(admEditIdx !== null) setTimeout(function(){ var f=document.getElementById('adm-form'); if(f) f.scrollIntoView({behavior:'smooth'}); }, 50);
}

function admEditArticle(i){ admEditIdx=i; admRenderRight(); }
function admNewArticle(){ admEditIdx='new'; admRenderRight(); }
function admCancelEdit(){ admEditIdx=null; admRenderRight(); }

function admDeleteArticle(i){
  if(!confirm('Supprimer cet article ?')) return;
  DATA[admSelCountry].articles.splice(i, 1);
  admEditIdx = null;
  admRenderRight();
}

function admSaveArticle(){
  var art = {
    type: document.getElementById('af-type').value,
    title: document.getElementById('af-title').value.trim(),
    excerpt: document.getElementById('af-excerpt').value.trim(),
    date: document.getElementById('af-date').value.trim(),
    url: document.getElementById('af-url').value.trim() || '#'
  };
  if(!art.title){ alert('Le titre est obligatoire.'); return; }
  if(!DATA[admSelCountry]) DATA[admSelCountry] = {region:'',tags:[],lat:0,lon:0,articles:[]};
  if(admEditIdx === 'new'){
    DATA[admSelCountry].articles.push(art);
  } else {
    DATA[admSelCountry].articles[admEditIdx] = art;
  }
  admEditIdx = null;
  admRenderRight();
}

</script>
<!-- MODALE ARTICLE -->
<div id="art-modal">
  <div id="art-box">
    <button class="art-close" id="art-modal-close">✕</button>
    <div id="art-type" class="art-type"></div>
    <div id="art-title" class="art-title"></div>
    <div id="art-meta" class="art-meta"></div>
    <div id="art-body" class="art-body"></div>
  </div>
</div>

<!-- ADMIN PANEL -->
<div id="admin-overlay">
  <div id="admin-box">
    <div class="adm-hd">
      <h2>ADMINISTRATION</h2>
      <span>Double-cliquez sur le logo pour ouvrir/fermer</span>
      <button class="adm-close" id="adm-close">✕</button>
    </div>
    <div class="adm-body">
      <div class="adm-left" id="adm-country-list"></div>
      <div class="adm-right" id="adm-right">
        <div style="display:flex;align-items:center;justify-content:center;height:100%;font-family:'Cormorant Garamond',serif;font-style:italic;color:var(--muted);font-size:14px;">Sélectionnez un pays</div>
      </div>
    </div>
    <div class="adm-export">
      <span class="adm-export-note" id="adm-export-note">Double-cliquez sur le logo pour consulter le contenu par pays.</span>
      <button class="adm-btn" id="adm-export-btn" style="display:none">EXPORTER data.js</button>
    </div>
  </div>
</div>

</body>
